        <path d="M96 0V512M160 0V512M224 0V512M288 0V512M352 0V512M416 0V512" stroke="#35E0FF" stroke-width="1"/>
        <path d="M0 96H512M0 160H512M0 224H512M0 288H512M0 352H512M0 416H512" stroke="#35E0FF" stroke-width="1"/>
      </g>

      <g opacity="0.9" filter="url(#glow)">
        <path d="M256 108V184" stroke="#35E0FF" stroke-width="8" stroke-linecap="round"/>
        <path d="M256 328V404" stroke="#35E0FF" stroke-width="8" stroke-linecap="round"/>
        <path d="M108 256H184" stroke="#35E0FF" stroke-width="8" stroke-linecap="round"/>
        <path d="M328 256H404" stroke="#35E0FF" stroke-width="8" stroke-linecap="round"/>

        <path d="M244 128H268M244 152H268M244 176H268" stroke="#35E0FF" stroke-width="4" stroke-linecap="round"/>
        <path d="M244 336H268M244 360H268M244 384H268" stroke="#35E0FF" stroke-width="4" stroke-linecap="round"/>
        <path d="M128 244V268M152 244V268M176 244V268" stroke="#35E0FF" stroke-width="4" stroke-linecap="round"/>
        <path d="M336 244V268M360 244V268M384 244V268" stroke="#35E0FF" stroke-width="4" stroke-linecap="round"/>
      </g>

      <g filter="url(#shadow)">
        <path d="M166 146L256 236L346 146L386 186L296 276L386 366L346 406L256 316L166 406L126 366L216 276L126 186L166 146Z"
