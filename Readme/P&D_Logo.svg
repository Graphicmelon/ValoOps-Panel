        <path d="M329 163L183 309" stroke="white" stroke-width="8" stroke-linecap="round"/>
      </g>

      <g filter="url(#glow)">
        <circle cx="256" cy="256" r="44" stroke="#35E0FF" stroke-width="6" opacity="0.95"/>
