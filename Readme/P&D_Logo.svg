<svg width="1900" height="420" viewBox="0 0 1900 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="64" y1="64" x2="448" y2="448" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0B1020"/>
      <stop offset="100%" stop-color="#111A2E"/>
    </linearGradient>

    <linearGradient id="xGrad" x1="140" y1="140" x2="372" y2="372" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF2D8D"/>
      <stop offset="55%" stop-color="#FF4DA6"/>
      <stop offset="100%" stop-color="#35E0FF"/>
    </linearGradient>

    <radialGradient id="coreGrad" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(256 256) rotate(90) scale(34)">
      <stop offset="0%" stop-color="#FFF2A6"/>
      <stop offset="45%" stop-color="#FF8A5B"/>
      <stop offset="100%" stop-color="#FF2D8D"/>
